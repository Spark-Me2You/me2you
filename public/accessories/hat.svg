<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 90">
  <!-- Hat cone body -->
  <polygon points="40,4 4,85 76,85" fill="#e91e63" stroke="#ad1457" stroke-width="2"/>
  <!-- Brim -->
  <ellipse cx="40" cy="84" rx="36" ry="9" fill="#e91e63" stroke="#ad1457" stroke-width="2"/>
  <!-- Star at tip -->
  <circle cx="40" cy="6" r="6" fill="#ffd700" stroke="#f9a825" stroke-width="1.5"/>
  <!-- Decorative stripe -->
  <line x1="19" y1="47" x2="61" y2="47" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
