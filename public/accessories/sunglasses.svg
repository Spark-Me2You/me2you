<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!-- Left lens -->
  <ellipse cx="30" cy="20" rx="24" ry="15" fill="rgba(33,150,243,0.55)"/>
  <!-- Right lens -->
  <ellipse cx="90" cy="20" rx="24" ry="15" fill="rgba(33,150,243,0.55)"/>
  <!-- Left lens outline -->
  <ellipse cx="30" cy="20" rx="24" ry="15" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Right lens outline -->
  <ellipse cx="90" cy="20" rx="24" ry="15" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Bridge -->
  <line x1="54" y1="19" x2="66" y2="19" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="6" y1="16" x2="6" y2="16" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="114" y1="16" x2="114" y2="16" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
</svg>
